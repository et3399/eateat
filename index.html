<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聚餐糾察隊 - 終極調查系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;500;700;900&display=swap');
        
        :root {
            --accent-primary: #00f2ff;
            --dark-bg: #0d1117;
            --card-bg: rgba(22, 27, 34, 0.9);
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: var(--dark-bg);
            color: #c9d1d9;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
        }

        .bg-grid {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background-image: 
                linear-gradient(rgba(0, 242, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 242, 255, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: -1;
        }

        .tech-card {
            background: var(--card-bg);
            border: 1px solid rgba(48, 54, 61, 1);
            border-top: 6px solid var(--accent-primary);
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(15px);
            border-radius: 12px;
        }

        .option-box {
            background: rgba(48, 54, 61, 0.4);
            border: 2px solid rgba(48, 54, 61, 1);
            transition: all 0.2s;
            cursor: pointer;
        }

        input:checked + .option-box {
            border-color: var(--accent-primary);
            background: rgba(0, 242, 255, 0.15);
            color: var(--accent-primary);
        }

        .btn-glow {
            border: 2px solid var(--accent-primary);
            color: var(--accent-primary);
            transition: all 0.4s;
            letter-spacing: 0.3em;
        }

        .btn-glow:hover {
            background: var(--accent-primary);
            color: var(--dark-bg);
            box-shadow: 0 0 30px var(--accent-primary);
        }

        .hidden-input { position: absolute; opacity: 0; width: 0; height: 0; }
    </style>
</head>
<body>
    <div class="bg-grid"></div>

    <div id="surveyPage" class="tech-card w-full max-w-2xl p-10 m-6 relative">
        <div class="text-center mb-10">
            <h1 class="text-3xl font-black tracking-widest text-white mb-2">聚餐偏好掃描系統</h1>
            <p class="text-cyan-600 text-sm font-bold tracking-widest uppercase">數據採集協議已啟動</p>
        </div>

        <form id="surveyForm" class="space-y-8">
            <!-- 名字輸入 -->
            <div>
                <label class="text-xs font-bold text-cyan-400 uppercase tracking-widest mb-3 block border-l-2 border-cyan-400 pl-2">Phase 00: 識別名單</label>
                <input type="text" name="username" required placeholder="輸入您的代號..." class="w-full bg-black/50 border-2 border-[#30363d] p-4 rounded-lg focus:border-cyan-400 outline-none text-white font-bold">
            </div>

            <!-- 預算 -->
            <div>
                <label class="text-xs font-bold text-cyan-400 uppercase tracking-widest mb-3 block border-l-2 border-cyan-400 pl-2">Phase 01: 預算分析</label>
                <div class="grid grid-cols-2 gap-3">
                    <label><input type="radio" name="budget" value="300" class="hidden-input" required><div class="option-box p-4 rounded-lg text-center font-bold text-sm">$300-</div></label>
                    <label><input type="radio" name="budget" value="600" class="hidden-input" checked><div class="option-box p-4 rounded-lg text-center font-bold text-sm">$600</div></label>
                    <label><input type="radio" name="budget" value="1200" class="hidden-input"><div class="option-box p-4 rounded-lg text-center font-bold text-sm">$1200</div></label>
                    <label><input type="radio" name="budget" value="unlimited" class="hidden-input"><div class="option-box p-4 rounded-lg text-center font-bold text-sm">無上限</div></label>
                </div>
            </div>

            <!-- 衝突過濾 -->
            <div>
                <label class="text-xs font-bold text-cyan-400 uppercase tracking-widest mb-3 block border-l-2 border-cyan-400 pl-2">Phase 02: 衝突過濾清單 (勾選不想吃的)</label>
                <div class="grid grid-cols-3 gap-2">
                    <label><input type="checkbox" name="hate" value="hotpot" class="hidden-input"><div class="option-box py-3 rounded text-center text-[10px] font-bold">火鍋</div></label>
                    <label><input type="checkbox" name="hate" value="bbq" class="hidden-input"><div class="option-box py-3 rounded text-center text-[10px] font-bold">燒肉</div></label>
                    <label><input type="checkbox" name="hate" value="buffet" class="hidden-input"><div class="option-box py-3 rounded text-center text-[10px] font-bold">自助餐</div></label>
                    <label><input type="checkbox" name="hate" value="raw" class="hidden-input"><div class="option-box py-3 rounded text-center text-[10px] font-bold text-red-400">生食海鮮</div></label>
                    <label><input type="checkbox" name="hate" value="beef" class="hidden-input"><div class="option-box py-3 rounded text-center text-[10px] font-bold text-orange-400">不吃牛</div></label>
                    <label><input type="checkbox" name="hate" value="vegan" class="hidden-input"><div class="option-box py-3 rounded text-center text-[10px] font-bold text-emerald-400">非素食</div></label>
                </div>
            </div>

            <button type="submit" class="btn-glow w-full py-5 rounded-lg font-black uppercase text-sm">
                啟動數據傳輸
            </button>
        </form>
    </div>

    <script>
        document.getElementById('surveyForm').onsubmit = (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = {};
            formData.forEach((value, key) => {
                if(!data[key]) { data[key] = value; }
                else { 
                    if(!Array.isArray(data[key])) data[key] = [data[key]];
                    data[key].push(value);
                }
            });
            sessionStorage.setItem('surveyData', JSON.stringify(data));
            window.location.href = 'upload.html';
        };
    </script>
</body>
</html>
