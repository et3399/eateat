<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聚餐糾察隊 - 終極調查系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;500;700;900&family=JetBrains+Mono:wght@400;700&display=swap');
        
        :root {
            --accent-primary: #00f2ff; /* 冰晶藍 */
            --accent-secondary: #00ffaa; /* 極光綠 */
            --dark-bg: #0d1117;
            --card-bg: rgba(22, 27, 34, 0.9);
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: var(--dark-bg);
            color: #c9d1d9;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
        }

        /* 背景網格動畫 */
        .bg-grid {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background-image: 
                linear-gradient(rgba(0, 242, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 242, 255, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: -1;
            animation: grid-move 20s linear infinite;
        }

        @keyframes grid-move {
            from { transform: translateY(0); }
            to { transform: translateY(60px); }
        }

        /* 核心卡片設計 */
        .tech-card {
            background: var(--card-bg);
            border: 1px solid rgba(48, 54, 61, 1);
            border-top: 6px solid var(--accent-primary);
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(15px);
            border-radius: 12px;
            transition: all 0.5s ease;
        }

        /* 打字機效果 */
        .typing {
            overflow: hidden;
            white-space: nowrap;
            border-right: 4px solid var(--accent-secondary);
            animation: typing 2s steps(20, end), blink 0.75s step-end infinite;
            margin: 0 auto;
        }

        @keyframes typing {
            from { width: 0; }
            to { width: 100%; }
        }

        @keyframes blink {
            from, to { border-color: transparent; }
            50% { border-color: var(--accent-secondary); }
        }

        /* 選項按鈕樣式 */
        .option-box {
            background: rgba(48, 54, 61, 0.4);
            border: 2px solid rgba(48, 54, 61, 1);
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            font-size: 1.25rem; /* 字體加大 */
        }

        .option-box:hover {
            border-color: var(--accent-primary);
            background: rgba(0, 242, 255, 0.08);
            transform: scale(1.02);
        }

        input:checked + .option-box {
            border-color: var(--accent-primary);
            background: rgba(0, 242, 255, 0.15);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.3);
            color: var(--accent-primary);
        }

        /* 輸入框樣式 */
        .tech-input {
            background: #010409;
            border: 2px solid #30363d;
            color: #f0f6fc;
            font-size: 1.25rem;
            transition: all 0.3s;
        }

        .tech-input:focus {
            border-color: var(--accent-primary);
            outline: none;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.2);
        }

        /* 提交按鈕 */
        .btn-glow {
            background: transparent;
            border: 2px solid var(--accent-primary);
            color: var(--accent-primary);
            font-size: 1.5rem;
            font-weight: 900;
            position: relative;
            overflow: hidden;
            transition: all 0.4s;
            letter-spacing: 0.3em;
        }

        .btn-glow:hover {
            background: var(--accent-primary);
            color: var(--dark-bg);
            box-shadow: 0 0 40px var(--accent-primary);
        }

        /* 進度條動畫 */
        .progress-bar {
            height: 4px;
            background: var(--accent-primary);
            width: 0%;
            transition: width 2s linear;
            box-shadow: 0 0 10px var(--accent-primary);
        }

        .hidden-input {
            position: absolute;
            opacity: 0;
            width: 0; height: 0;
        }

        /* 頁面進入動畫 */
        .fade-in {
            animation: fadeIn 0.8s forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="bg-grid"></div>

    <!-- 調查表單頁面 -->
    <div id="surveyPage" class="tech-card w-full max-w-2xl p-10 m-6 relative overflow-hidden fade-in">
        <div class="absolute top-0 right-0 p-3 opacity-30 font-mono text-xs">系統狀態：在線</div>
        
        <div class="text-center mb-14">
            <div class="flex justify-center mb-6">
                <div class="w-20 h-20 rounded-full border-2 border-cyan-400 flex items-center justify-center animate-pulse">
                    <span class="text-5xl text-cyan-400">⚡</span>
                </div>
            </div>
            <div class="inline-block">
                <h1 class="text-4xl font-black tracking-widest text-white typing mb-4">聚餐偏好掃描系統</h1>
            </div>
            <p class="text-cyan-600 text-lg font-bold tracking-widest uppercase">數據採集協議已啟動</p>
        </div>

        <form id="surveyForm" class="space-y-12">
            <div>
                <label class="text-lg font-black text-cyan-400 uppercase tracking-widest mb-6 block border-l-4 border-cyan-400 pl-3">第 01 階段：預算權限分析</label>
                <div class="grid grid-cols-2 gap-4">
                    <label><input type="radio" name="budget" value="300" class="hidden-input" required><div class="option-box p-6 rounded-lg text-center font-bold">低階門檻 ($300-)</div></label>
                    <label><input type="radio" name="budget" value="600" class="hidden-input"><div class="option-box p-6 rounded-lg text-center font-bold">標準協議 ($600)</div></label>
                    <label><input type="radio" name="budget" value="1200" class="hidden-input"><div class="option-box p-6 rounded-lg text-center font-bold">高級核心 ($1200)</div></label>
                    <label><input type="radio" name="budget" value="unlimited" class="hidden-input"><div class="option-box p-6 rounded-lg text-center font-bold">無界限模式 (無限)</div></label>
                </div>
            </div>

            <div>
                <label class="text-lg font-black text-cyan-400 uppercase tracking-widest mb-6 block border-l-4 border-cyan-400 pl-3">第 02 階段：料理類型過濾</label>
                <div class="grid grid-cols-3 gap-3">
                    <label><input type="checkbox" name="prefer" value="hotpot" class="hidden-input"><div class="option-box py-5 rounded-lg text-center font-bold">火鍋</div></label>
                    <label><input type="checkbox" name="prefer" value="bbq" class="hidden-input"><div class="option-box py-5 rounded-lg text-center font-bold">燒肉</div></label>
                    <label><input type="checkbox" name="prefer" value="buffet" class="hidden-input"><div class="option-box py-5 rounded-lg text-center font-bold">自助餐</div></label>
                    <label><input type="checkbox" name="prefer" value="thai" class="hidden-input"><div class="option-box py-5 rounded-lg text-center font-bold">泰國菜</div></label>
                    <label><input type="checkbox" name="prefer" value="bistro" class="hidden-input"><div class="option-box py-5 rounded-lg text-center font-bold">餐酒館</div></label>
                    <label><input type="checkbox" name="prefer" value="jp" class="hidden-input"><div class="option-box py-5 rounded-lg text-center font-bold">日韓系</div></label>
                </div>
            </div>

            <div>
                <label class="text-lg font-black text-cyan-400 uppercase tracking-widest mb-6 block border-l-4 border-cyan-400 pl-3">第 03 階段：座標範圍查詢</label>
                <input type="text" name="location" placeholder="輸入搜尋地區 (如：信義區、西門)..." class="tech-input w-full p-6 rounded-lg font-bold">
            </div>

            <div>
                <label class="text-lg font-black text-emerald-400 uppercase tracking-widest mb-6 block border-l-4 border-emerald-400 pl-3">第 04 階段：安全防禦過濾</label>
                <div class="flex gap-4">
                    <label class="flex-1"><input type="checkbox" name="avoid" value="vegan" class="hidden-input"><div class="option-box p-5 rounded-lg text-center font-bold">排除全素</div></label>
                    <label class="flex-1"><input type="checkbox" name="avoid" value="spicy" class="hidden-input"><div class="option-box p-5 rounded-lg text-center font-bold">排除太辣</div></label>
                </div>
            </div>

            <button type="submit" class="btn-glow w-full py-6 rounded-lg mt-8">
                啟動數據傳輸
            </button>
        </form>
    </div>

    <!-- 上傳加載中頁面 -->
    <div id="loadingPage" class="hidden tech-card w-full max-w-md p-12 text-center fade-in">
        <div class="flex justify-center mb-8">
            <div class="w-16 h-16 border-4 border-cyan-500 border-t-transparent rounded-full animate-spin"></div>
        </div>
        <h2 class="text-2xl font-black text-white mb-4 tracking-widest">數據加密上傳中...</h2>
        <p class="text-cyan-500 font-mono text-sm mb-8">正在連接遠端伺服器伺服器進行同步...</p>
        <div class="w-full bg-gray-800 rounded-full h-1 overflow-hidden">
            <div id="uploadProgress" class="progress-bar"></div>
        </div>
    </div>

    <!-- 上傳成功結果頁面 -->
    <div id="resultPage" class="hidden tech-card w-full max-w-xl p-12 text-center fade-in">
        <div class="mb-10 relative inline-block">
            <div class="absolute inset-0 bg-cyan-400 blur-3xl opacity-30 animate-pulse"></div>
            <span class="text-8xl relative">📡</span>
        </div>
        <h2 class="text-4xl font-black text-white mb-8 tracking-tighter">數據已成功上傳</h2>
        <div class="bg-black/50 p-8 border-l-4 border-emerald-400 text-left mb-10 rounded-r-lg shadow-inner">
            <p class="text-emerald-400 font-mono text-lg leading-loose">
                > 資料同步狀態：完成 (100%)<br>
                > 目標主機：CL-SERVER-09<br>
                > 安全等級：最高加密<br>
                <br>
                > <span class="text-white">系統通知：</span>主辦人已收到報告，<br>
                　 禁止任何形式的餐廳抱怨。
            </p>
        </div>
        <button onclick="location.reload()" class="text-gray-500 hover:text-cyan-400 text-sm font-bold transition-all tracking-widest border border-gray-700 px-6 py-2 rounded-full hover:border-cyan-400">
            >> 重啟調查系統
        </button>
    </div>

    <script>
        const surveyPage = document.getElementById('surveyPage');
        const loadingPage = document.getElementById('loadingPage');
        const resultPage = document.getElementById('resultPage');
        const progress = document.getElementById('uploadProgress');
        const form = document.getElementById('surveyForm');

        form.onsubmit = (e) => {
            e.preventDefault();
            
            // 步驟 1：隱藏調查表單
            surveyPage.classList.add('hidden');
            
            // 步驟 2：顯示加載動畫
            loadingPage.classList.remove('hidden');
            setTimeout(() => {
                progress.style.width = '100%';
            }, 100);

            // 步驟 3：模擬傳輸延遲，2.5秒後跳轉至結果頁面
            setTimeout(() => {
                loadingPage.classList.add('hidden');
                resultPage.classList.remove('hidden');
            }, 2500);
        };
    </script>
</body>
</html>
