<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聚餐糾察隊 - 數據採集終端</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;500;700;900&family=JetBrains+Mono:wght@400;700&display=swap');
        
        :root {
            --accent-primary: #00f2ff;
            --accent-secondary: #00ffaa;
            --dark-bg: #0d1117;
            --card-bg: rgba(22, 27, 34, 0.9);
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: var(--dark-bg);
            color: #c9d1d9;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
        }

        .bg-grid {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background-image: 
                linear-gradient(rgba(0, 242, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 242, 255, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: -1;
            animation: grid-move 20s linear infinite;
        }

        @keyframes grid-move {
            from { transform: translateY(0); }
            to { transform: translateY(60px); }
        }

        .tech-card {
            background: var(--card-bg);
            border: 1px solid rgba(48, 54, 61, 1);
            border-top: 6px solid var(--accent-primary);
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(15px);
            border-radius: 12px;
            transition: all 0.5s ease;
        }

        .typing {
            overflow: hidden;
            white-space: nowrap;
            border-right: 4px solid var(--accent-secondary);
            animation: typing 2s steps(20, end), blink 0.75s step-end infinite;
            margin: 0 auto;
        }

        @keyframes typing {
            from { width: 0; }
            to { width: 100%; }
        }

        @keyframes blink {
            from, to { border-color: transparent; }
            50% { border-color: var(--accent-secondary); }
        }

        .option-box {
            background: rgba(48, 54, 61, 0.4);
            border: 2px solid rgba(48, 54, 61, 1);
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            font-size: 1rem;
        }

        .option-box:hover {
            border-color: var(--accent-primary);
            background: rgba(0, 242, 255, 0.08);
            transform: translateY(-2px);
        }

        input:checked + .option-box {
            border-color: var(--accent-primary);
            background: rgba(0, 242, 255, 0.15);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.3);
            color: var(--accent-primary);
        }

        .tech-select {
            background: #010409;
            border: 2px solid #30363d;
            color: #f0f6fc;
            transition: all 0.3s;
        }

        .tech-select:focus {
            border-color: var(--accent-primary);
            outline: none;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.2);
        }

        .btn-glow {
            background: transparent;
            border: 2px solid var(--accent-primary);
            color: var(--accent-primary);
            font-size: 1.25rem;
            font-weight: 900;
            position: relative;
            overflow: hidden;
            transition: all 0.4s;
            letter-spacing: 0.2em;
        }

        .btn-glow:hover {
            background: var(--accent-primary);
            color: var(--dark-bg);
            box-shadow: 0 0 40px var(--accent-primary);
        }

        .hidden-input {
            position: absolute;
            opacity: 0;
            width: 0; height: 0;
        }

        .fade-in {
            animation: fadeIn 0.8s forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="bg-grid"></div>

    <div id="surveyPage" class="tech-card w-full max-w-xl p-8 m-4 relative overflow-hidden fade-in">
        <div class="absolute top-0 right-0 p-3 opacity-30 font-mono text-[10px]">AUTH_MODE: ANONYMOUS</div>
        
        <div class="text-center mb-10">
            <div class="flex justify-center mb-4">
                <div class="w-16 h-16 rounded-full border-2 border-cyan-400 flex items-center justify-center animate-pulse">
                    <span class="text-4xl text-cyan-400">🍴</span>
                </div>
            </div>
            <div class="inline-block">
                <h1 class="text-2xl font-black tracking-widest text-white typing mb-2">聚餐數據採集終端</h1>
            </div>
            <p class="text-cyan-600 text-xs font-bold tracking-widest uppercase">Protocol version 2.5 // No Complaining Allowed</p>
        </div>

        <form id="surveyForm" class="space-y-8">
            <!-- 1. 預算 -->
            <div>
                <label class="text-sm font-black text-cyan-400 uppercase tracking-widest mb-4 block border-l-4 border-cyan-400 pl-3">Phase 01: 預算權限分析</label>
                <div class="grid grid-cols-2 gap-3">
                    <label><input type="radio" name="budget" value="300" class="hidden-input" required><div class="option-box p-4 rounded-lg text-center font-bold">小資 ($300-)</div></label>
                    <label><input type="radio" name="budget" value="600" class="hidden-input"><div class="option-box p-4 rounded-lg text-center font-bold">一般 ($600)</div></label>
                    <label><input type="radio" name="budget" value="1000" class="hidden-input"><div class="option-box p-4 rounded-lg text-center font-bold">質感 ($1000)</div></label>
                    <label><input type="radio" name="budget" value="unlimited" class="hidden-input"><div class="option-box p-4 rounded-lg text-center font-bold">無上限 (!!?)</div></label>
                </div>
            </div>

            <!-- 2. 避雷針 -->
            <div>
                <label class="text-sm font-black text-cyan-400 uppercase tracking-widest mb-4 block border-l-4 border-cyan-400 pl-3">Phase 02: 衝突過濾清單 (多選)</label>
                <div class="grid grid-cols-2 gap-3">
                    <label><input type="checkbox" name="avoid" value="buffet" class="hidden-input"><div class="option-box p-4 rounded-lg text-center font-bold">吃到飽</div></label>
                    <label><input type="checkbox" name="avoid" value="vegan" class="hidden-input"><div class="option-box p-4 rounded-lg text-center font-bold">全素食</div></label>
                    <label><input type="checkbox" name="avoid" value="raw" class="hidden-input"><div class="option-box p-4 rounded-lg text-center font-bold">生食海鮮</div></label>
                    <label><input type="checkbox" name="avoid" value="spicy" class="hidden-input"><div class="option-box p-4 rounded-lg text-center font-bold">極致辛辣</div></label>
                </div>
            </div>

            <!-- 3. 目的 -->
            <div>
                <label class="text-sm font-black text-cyan-400 uppercase tracking-widest mb-4 block border-l-4 border-cyan-400 pl-3">Phase 03: 核心目的標籤</label>
                <select id="purpose" class="tech-select w-full p-4 rounded-lg font-bold outline-none">
                    <option value="eat">認真吃飯 (吃完就散)</option>
                    <option value="talk">瘋狂聊天 (環境安靜)</option>
                    <option value="photo">拍照打卡 (視覺優先)</option>
                </select>
            </div>

            <button type="submit" class="btn-glow w-full py-5 rounded-lg mt-4 shadow-2xl transform active:scale-95 transition-all uppercase">
                啟動數據傳輸
            </button>
        </form>
    </div>

    <script>
        document.getElementById('surveyForm').onsubmit = (e) => {
            e.preventDefault();
            
            // 收集數據
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData);
            
            // 處理多選
            data.avoid = formData.getAll('avoid');
            data.purpose = document.getElementById('purpose').value;
            data.timestamp = new Date().toISOString();

            // 儲存至 sessionStorage
            sessionStorage.setItem('surveyData', JSON.stringify(data));
            
            // 執行跳轉至 upload.html
            console.log('數據封裝完成，開始導向...');
            window.location.href = 'upload.html';
        };
    </script>
</body>
</html>
