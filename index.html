<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聚餐糾察隊 - 數據採集終端</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;500;700;900&family=JetBrains+Mono:wght@400;700&display=swap');
        
        :root {
            --accent-primary: #00f2ff;
            --accent-secondary: #00ffaa;
            --dark-bg: #0d1117;
            --card-bg: rgba(22, 27, 34, 0.9);
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: var(--dark-bg);
            color: #c9d1d9;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
        }

        .bg-grid {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background-image: 
                linear-gradient(rgba(0, 242, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 242, 255, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: -1;
            animation: grid-move 20s linear infinite;
        }

        @keyframes grid-move {
            from { transform: translateY(0); }
            to { transform: translateY(60px); }
        }

        .tech-card {
            background: var(--card-bg);
            border: 1px solid rgba(48, 54, 61, 1);
            border-top: 6px solid var(--accent-primary);
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(15px);
            border-radius: 12px;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .typing {
            overflow: hidden;
            white-space: nowrap;
            border-right: 4px solid var(--accent-secondary);
            animation: typing 2s steps(20, end), blink 0.75s step-end infinite;
            margin: 0 auto;
        }

        @keyframes typing {
            from { width: 0; }
            to { width: 100%; }
        }

        @keyframes blink {
            from, to { border-color: transparent; }
            50% { border-color: var(--accent-secondary); }
        }

        .option-box {
            background: rgba(48, 54, 61, 0.4);
            border: 2px solid rgba(48, 54, 61, 1);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            font-size: 0.875rem;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            min-height: 54px;
        }

        .option-box:hover {
            border-color: var(--accent-primary);
            background: rgba(0, 242, 255, 0.08);
            transform: translateY(-2px);
        }

        input:checked + .option-box {
            border-color: var(--accent-primary);
            background: rgba(0, 242, 255, 0.15);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.3);
            color: var(--accent-primary);
        }

        .tech-input {
            background: #010409;
            border: 2px solid #30363d;
            color: #f0f6fc;
            transition: all 0.3s;
        }

        .tech-input:focus {
            border-color: var(--accent-primary);
            outline: none;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.2);
        }

        .btn-glow {
            background: transparent;
            border: 2px solid var(--accent-primary);
            color: var(--accent-primary);
            font-size: 1.25rem;
            font-weight: 900;
            position: relative;
            overflow: hidden;
            transition: all 0.4s;
            letter-spacing: 0.2em;
        }

        .btn-glow:hover {
            background: var(--accent-primary);
            color: var(--dark-bg);
            box-shadow: 0 0 40px var(--accent-primary);
        }

        .hidden-input {
            position: absolute;
            opacity: 0;
            width: 0; height: 0;
        }

        /* SPA 狀態切換 */
        .page-container {
            display: none;
        }
        .page-container.active {
            display: block;
            animation: slideUp 0.6s ease-out forwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .progress-line-container {
            width: 100%;
            height: 4px;
            background: #161b22;
            border-radius: 2px;
            overflow: hidden;
            margin: 20px 0;
        }

        .progress-line-fill {
            width: 0%;
            height: 100%;
            background: var(--accent-secondary);
            box-shadow: 0 0 10px var(--accent-secondary);
            transition: width 2s cubic-bezier(0.1, 0.5, 0.5, 1);
        }
    </style>
</head>
<body>

    <div class="bg-grid"></div>

    <!-- 主容器 -->
    <div class="tech-card w-full max-w-2xl p-8 m-4 relative overflow-hidden">
        <div class="absolute top-0 right-0 p-3 opacity-30 font-mono text-[10px]">SYSTEM_STATUS: STABLE</div>

        <!-- 頁面 1: 調查表單 -->
        <div id="formView" class="page-container active">
            <div class="text-center mb-10">
                <div class="flex justify-center mb-4">
                    <div class="w-16 h-16 rounded-full border-2 border-cyan-400 flex items-center justify-center animate-pulse">
                        <span class="text-4xl text-cyan-400">🍴</span>
                    </div>
                </div>
                <div class="inline-block">
                    <h1 class="text-2xl font-black tracking-widest text-white typing mb-2">聚餐數據採集終端</h1>
                </div>
                <p class="text-cyan-600 text-xs font-bold tracking-widest uppercase">Protocol 2.9 // Multi-Type Collision Filter</p>
            </div>

            <form id="surveyForm" class="space-y-8">
                <!-- 名字 -->
                <div>
                    <label class="text-sm font-black text-cyan-400 uppercase tracking-widest mb-4 block border-l-4 border-cyan-400 pl-3">Phase 00: 身份識別</label>
                    <input type="text" name="userName" id="userName" placeholder="請輸入您的代號 / 姓名" required
                        class="tech-input w-full p-4 rounded-lg font-bold outline-none placeholder:text-gray-600">
                </div>

                <!-- 預算 -->
                <div>
                    <label class="text-sm font-black text-cyan-400 uppercase tracking-widest mb-4 block border-l-4 border-cyan-400 pl-3">Phase 01: 預算權限</label>
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                        <label><input type="radio" name="budget" value="300" class="hidden-input" required><div class="option-box p-3 rounded-lg text-center font-bold">小資<br>$300-</div></label>
                        <label><input type="radio" name="budget" value="600" class="hidden-input"><div class="option-box p-3 rounded-lg text-center font-bold">一般<br>$600</div></label>
                        <label><input type="radio" name="budget" value="1000" class="hidden-input"><div class="option-box p-3 rounded-lg text-center font-bold">質感<br>$1000</div></label>
                        <label><input type="radio" name="budget" value="unlimited" class="hidden-input"><div class="option-box p-3 rounded-lg text-center font-bold">無上限<br>!∞</div></label>
                    </div>
                </div>

                <!-- 類別過濾 -->
                <div>
                    <label class="text-sm font-black text-cyan-400 uppercase tracking-widest mb-4 block border-l-4 border-cyan-400 pl-3">Phase 02: 類別過濾 (勾選不想吃的)</label>
                    <div class="grid grid-cols-2 md:grid-cols-3 gap-3">
                        <label><input type="checkbox" name="avoid" value="hotpot" class="hidden-input"><div class="option-box p-4 rounded-lg text-center font-bold">麻辣/火鍋</div></label>
                        <label><input type="checkbox" name="avoid" value="shabu" class="hidden-input"><div class="option-box p-4 rounded-lg text-center font-bold">精緻涮涮鍋</div></label>
                        <label><input type="checkbox" name="avoid" value="jp_bbq" class="hidden-input"><div class="option-box p-4 rounded-lg text-center font-bold">日式燒肉</div></label>
                        <label><input type="checkbox" name="avoid" value="kr_bbq" class="hidden-input"><div class="option-box p-4 rounded-lg text-center font-bold">韓式燒肉</div></label>
                        <label><input type="checkbox" name="avoid" value="buffet" class="hidden-input"><div class="option-box p-4 rounded-lg text-center font-bold">百匯吃到飽</div></label>
                        <label><input type="checkbox" name="avoid" value="izakaya" class="hidden-input"><div class="option-box p-4 rounded-lg text-center font-bold">居酒屋/串燒</div></label>
                        
                        <label><input type="checkbox" name="avoid" value="vegan" class="hidden-input"><div class="option-box p-4 rounded-lg text-center font-bold text-emerald-400">素食</div></label>
                        <label><input type="checkbox" name="avoid" value="raw" class="hidden-input"><div class="option-box p-4 rounded-lg text-center font-bold text-red-400">生食海鮮</div></label>
                        <label><input type="checkbox" name="avoid" value="beef" class="hidden-input"><div class="option-box p-4 rounded-lg text-center font-bold text-orange-400">不吃牛</div></label>
                    </div>
                </div>

                <button type="submit" class="btn-glow w-full py-5 rounded-lg mt-4 shadow-2xl transform active:scale-95 transition-all">
                    確認送出數據
                </button>
            </form>
        </div>

        <!-- 頁面 2: 上傳成功畫面 (模擬 UPLOAD) -->
        <div id="successView" class="page-container">
            <div class="text-center py-10 space-y-8">
                <!-- 上傳動畫 -->
                <div id="uploadLoader">
                    <div class="inline-block animate-spin mb-4">
                        <svg class="w-12 h-12 text-cyan-400" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                        </svg>
                    </div>
                    <h2 class="text-xl font-bold text-white tracking-widest">數據加密同步中...</h2>
                    <div class="progress-line-container">
                        <div id="barFill" class="progress-line-fill"></div>
                    </div>
                </div>

                <!-- 最終成功結果 -->
                <div id="finalResult" class="hidden space-y-6">
                    <div class="w-20 h-20 bg-cyan-400/20 rounded-full flex items-center justify-center mx-auto border-2 border-cyan-400 shadow-[0_0_30px_rgba(0,242,255,0.4)]">
                        <span class="text-4xl">✅</span>
                    </div>
                    <div>
                        <h2 class="text-2xl font-black text-white mb-2">上傳成功 / UPLOADED</h2>
                        <p class="text-gray-400">填寫者姓名：<span id="resultName" class="text-cyan-400 font-bold underline"></span></p>
                    </div>
                    
                    <div class="bg-black/50 p-6 rounded-lg border border-gray-800 text-left font-mono text-xs space-y-2">
                        <div class="text-cyan-400">> 封包封裝完成</div>
                        <div class="text-cyan-400">> 目的地: CLOUD_TERMINAL_01</div>
                        <div class="text-emerald-400">> 數據校验成功: 無衝突異常</div>
                        <div class="text-gray-600 mt-4 underline cursor-pointer" onclick="location.reload()">重新發送數據?</div>
                    </div>

                    <p class="text-xs text-gray-500 italic">感謝您的配合。資料已安全儲存，請等候主辦人通知。</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('surveyForm');
        const formView = document.getElementById('formView');
        const successView = document.getElementById('successView');
        const barFill = document.getElementById('barFill');
        const uploadLoader = document.getElementById('uploadLoader');
        const finalResult = document.getElementById('finalResult');
        const resultName = document.getElementById('resultName');

        form.onsubmit = (e) => {
            e.preventDefault();
            
            // 擷取名字並帶入結果頁
            const userName = document.getElementById('userName').value;
            resultName.innerText = userName;

            // 切換畫面 (隱藏表單，顯示上傳頁)
            formView.classList.remove('active');
            successView.classList.add('active');

            // 啟動進度條動畫
            setTimeout(() => {
                barFill.style.width = '100%';
            }, 100);

            // 2.5 秒後顯示最終成功畫面
            setTimeout(() => {
                uploadLoader.classList.add('hidden');
                finalResult.classList.remove('hidden');
                finalResult.style.animation = 'slideUp 0.6s ease-out forwards';
            }, 2500);
        };
    </script>
</body>
</html>
