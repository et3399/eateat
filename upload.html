<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>數據傳輸中 - 聚餐糾察隊</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;700;900&family=JetBrains+Mono:wght@400;700&display=swap');
        body { font-family: 'JetBrains Mono', 'Noto Sans TC', sans-serif; background-color: #0d1117; color: #c9d1d9; }
        .bg-grid { position: fixed; inset: 0; background-image: linear-gradient(rgba(0, 242, 255, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 242, 255, 0.03) 1px, transparent 1px); background-size: 60px 60px; z-index: -1; }
        .tech-card { background: rgba(22, 27, 34, 0.9); border: 1px solid #30363d; border-top: 6px solid #00f2ff; backdrop-filter: blur(15px); border-radius: 12px; }
        .progress-fill { height: 100%; background: #00f2ff; box-shadow: 0 0 15px #00f2ff; transition: width 0.1s linear; }

        /* 雲端上傳動畫 */
        .upload-animation {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto 2.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .cloud-icon {
            position: relative;
            z-index: 2;
            color: #00f2ff;
            filter: drop-shadow(0 0 10px rgba(0, 242, 255, 0.5));
        }
        .data-particle {
            position: absolute;
            bottom: 0;
            width: 4px;
            height: 12px;
            background: #00f2ff;
            border-radius: 2px;
            opacity: 0;
            animation: upload-stream 1.5s infinite linear;
        }
        .data-particle:nth-child(2) { left: 30%; animation-delay: 0.2s; }
        .data-particle:nth-child(3) { left: 50%; animation-delay: 0.5s; }
        .data-particle:nth-child(4) { left: 70%; animation-delay: 0.8s; }
        .data-particle:nth-child(5) { left: 40%; animation-delay: 1.1s; }

        @keyframes upload-stream {
            0% { transform: translateY(40px); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(-40px); opacity: 0; }
        }

        .success-glow {
            position: absolute;
            width: 80px;
            height: 80px;
            background: radial-gradient(circle, rgba(0, 242, 255, 0.4) 0%, transparent 70%);
            border-radius: 50%;
            animation: glow-pulse 2s infinite ease-in-out;
        }

        @keyframes glow-pulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.3); opacity: 0.8; }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">
    <div class="bg-grid"></div>

    <!-- 加載中畫面 -->
    <div id="loadingBox" class="tech-card w-full max-w-md p-10 text-center">
        <div class="w-16 h-16 border-4 border-cyan-500 border-t-transparent rounded-full animate-spin mx-auto mb-8"></div>
        <h2 class="text-xl font-black text-white mb-2 tracking-widest">數據加密傳輸中</h2>
        <div class="w-full bg-[#161b22] h-2 rounded-full overflow-hidden my-6 border border-cyan-900">
            <div id="bar" class="progress-fill" style="width: 0%"></div>
        </div>
        <div id="percent" class="text-cyan-400 font-mono text-lg">0%</div>
    </div>

    <!-- 成功畫面 -->
    <div id="successBox" class="hidden tech-card w-full max-w-lg p-10 text-center">
        <!-- 雲端上傳動畫圖示 -->
        <div class="upload-animation">
            <div class="success-glow"></div>
            <!-- 使用 SVG 雲端圖示 -->
            <svg class="cloud-icon w-20 h-20" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v8"></path>
            </svg>
            <div class="data-particle"></div>
            <div class="data-particle"></div>
            <div class="data-particle"></div>
            <div class="data-particle"></div>
            <div class="data-particle"></div>
        </div>

        <h2 class="text-3xl font-black text-white mb-8 uppercase tracking-tighter">Upload Success</h2>
        
        <div class="bg-black/60 p-8 text-left border-l-4 border-emerald-400 rounded-lg font-mono space-y-5 mb-10 shadow-inner">
            <p class="text-emerald-400 text-lg font-bold">> STATUS: <span class="text-white">DATA_SYNC_COMPLETE</span></p>
            <p class="text-cyan-400 text-lg font-bold">> TARGET_ID: <span id="userNameDisplay" class="font-bold underline text-white">取得中...</span></p>
            <p class="text-orange-400 text-lg font-bold">> NODE: <span class="text-white">IU8_EDGE_SERVER</span></p>
            <p class="text-gray-400 text-base mt-6 border-t border-white/10 pt-4 italic leading-relaxed">
                > 數據採集完成。加密協議已終止，請靜候主辦人進一步通知。
            </p>
        </div>
    </div>

    <script>
        function getCapturedName() {
            const sessionName = sessionStorage.getItem('userName');
            if (sessionName) return sessionName;

            const surveyData = sessionStorage.getItem('surveyData');
            if (surveyData) {
                try {
                    const parsed = JSON.parse(surveyData);
                    if (parsed.username) return parsed.username;
                } catch(e) {}
            }

            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.has('name')) return urlParams.get('name');

            return "UNKNOWN_USER";
        }

        let p = 0;
        const bar = document.getElementById('bar');
        const pct = document.getElementById('percent');
        const userDisplay = document.getElementById('userNameDisplay');

        const itv = setInterval(() => {
            p += Math.floor(Math.random() * 10) + 2;
            if(p >= 100) {
                p = 100;
                clearInterval(itv);
                
                userDisplay.innerText = getCapturedName();

                setTimeout(() => {
                    document.getElementById('loadingBox').classList.add('hidden');
                    document.getElementById('successBox').classList.remove('hidden');
                }, 500);
            }
            bar.style.width = p + '%';
            pct.innerText = p + '%';
        }, 100);
    </script>
</body>
</html>
