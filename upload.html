<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>數據傳輸中 - 聚餐糾察隊</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;500;700;900&family=JetBrains+Mono:wght@400;700&display=swap');
        
        :root {
            --accent-primary: #00f2ff;
            --accent-secondary: #00ffaa;
            --dark-bg: #0d1117;
            --card-bg: rgba(22, 27, 34, 0.9);
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: var(--dark-bg);
            color: #c9d1d9;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
        }

        .bg-grid {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background-image: 
                linear-gradient(rgba(0, 242, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 242, 255, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: -1;
            animation: grid-move 20s linear infinite;
        }

        @keyframes grid-move {
            from { transform: translateY(0); }
            to { transform: translateY(60px); }
        }

        .tech-card {
            background: var(--card-bg);
            border: 1px solid rgba(48, 54, 61, 1);
            border-top: 6px solid var(--accent-primary);
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(15px);
            border-radius: 12px;
            width: 100%;
            max-width: 500px;
            padding: 3rem;
            position: relative;
        }

        .progress-container {
            width: 100%;
            background: #161b22;
            height: 8px;
            border-radius: 10px;
            overflow: hidden;
            margin: 2rem 0;
            border: 1px solid rgba(0, 242, 255, 0.2);
        }

        .progress-fill {
            height: 100%;
            background: var(--accent-primary);
            width: 0%;
            transition: width 0.3s ease;
            box-shadow: 0 0 15px var(--accent-primary);
        }

        .fade-in {
            animation: fadeIn 0.8s forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .success-glow {
            animation: successGlow 2s infinite alternate;
        }

        @keyframes successGlow {
            from { filter: drop-shadow(0 0 5px var(--accent-secondary)); }
            to { filter: drop-shadow(0 0 25px var(--accent-secondary)); }
        }
    </style>
</head>
<body>

    <div class="bg-grid"></div>

    <!-- 加載中畫面 -->
    <div id="loadingContent" class="tech-card text-center fade-in">
        <div class="flex justify-center mb-8">
            <div class="w-16 h-16 border-4 border-cyan-500 border-t-transparent rounded-full animate-spin"></div>
        </div>
        <h2 id="statusText" class="text-2xl font-black text-white mb-4 tracking-widest">數據加密傳輸中...</h2>
        <p class="text-cyan-500 font-mono text-sm mb-4">封包同步中：LOCAL -> CL-SERVER-09</p>
        
        <div class="progress-container">
            <div id="progressBar" class="progress-fill"></div>
        </div>
        
        <div id="percentage" class="text-cyan-400 font-mono text-xl">0%</div>
    </div>

    <!-- 成功畫面 -->
    <div id="successContent" class="hidden tech-card text-center fade-in">
        <div class="mb-10 success-glow">
            <span class="text-8xl">📡</span>
        </div>
        <h2 class="text-4xl font-black text-white mb-8">數據已上傳完成</h2>
        <div class="bg-black/50 p-8 border-l-4 border-emerald-400 text-left mb-10 rounded-r-lg shadow-xl">
            <p class="text-emerald-400 font-mono text-lg leading-loose">
                > 檔案同步狀態：SUCCESS<br>
                > 安全層級：最高加密 (AES-256)<br>
                > 下次操作：等待主辦人決策<br>
                <br>
                > <span class="text-white">系統警報：</span>請準時出席，<br>
                　 禁止任何形式的現場反悔。
            </p>
        </div>
        <button onclick="window.location.href='eat.html'" class="text-gray-500 hover:text-cyan-400 text-sm font-bold transition-all tracking-widest border border-gray-700 px-8 py-3 rounded-full hover:border-cyan-400">
            回主系統頁面
        </button>
    </div>

    <script>
        const progressBar = document.getElementById('progressBar');
        const percentageText = document.getElementById('percentage');
        const loadingContent = document.getElementById('loadingContent');
        const successContent = document.getElementById('successContent');
        const statusText = document.getElementById('statusText');

        let percent = 0;
        // 模擬動態上傳進度
        const interval = setInterval(() => {
            percent += Math.floor(Math.random() * 10) + 2; // 隨機增加進度
            if (percent >= 100) {
                percent = 100;
                clearInterval(interval);
                completeUpload();
            }
            progressBar.style.width = percent + '%';
            percentageText.innerText = percent + '%';
        }, 200);

        function completeUpload() {
            statusText.innerText = '傳輸驗證成功！';
            setTimeout(() => {
                loadingContent.classList.add('hidden');
                successContent.classList.remove('hidden');
            }, 800);
        }

        // 頁面載入時讀取剛剛存下來的資料 (模擬行為)
        window.onload = () => {
            const data = sessionStorage.getItem('surveyData');
            if (data) {
                console.log('偵測到待上傳數據:', JSON.parse(data));
            }
        };
    </script>
</body>
</html>
