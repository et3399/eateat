<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>數據傳輸中 - 聚餐糾察隊</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;700;900&family=JetBrains+Mono:wght@400;700&display=swap');
        body { font-family: 'JetBrains Mono', 'Noto Sans TC', sans-serif; background-color: #0d1117; color: #c9d1d9; }
        .bg-grid { position: fixed; inset: 0; background-image: linear-gradient(rgba(0, 242, 255, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 242, 255, 0.03) 1px, transparent 1px); background-size: 60px 60px; z-index: -1; }
        .tech-card { background: rgba(22, 27, 34, 0.9); border: 1px solid #30363d; border-top: 6px solid #00f2ff; backdrop-filter: blur(15px); border-radius: 12px; }
        .progress-fill { height: 100%; background: #00f2ff; box-shadow: 0 0 15px #00f2ff; transition: width 0.1s linear; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">
    <div class="bg-grid"></div>

    <!-- 加載中畫面 -->
    <div id="loadingBox" class="tech-card w-full max-w-md p-10 text-center">
        <div class="w-16 h-16 border-4 border-cyan-500 border-t-transparent rounded-full animate-spin mx-auto mb-8"></div>
        <h2 class="text-xl font-black text-white mb-2 tracking-widest">數據加密傳輸中</h2>
        <div class="w-full bg-[#161b22] h-2 rounded-full overflow-hidden my-6 border border-cyan-900">
            <div id="bar" class="progress-fill" style="width: 0%"></div>
        </div>
        <div id="percent" class="text-cyan-400 font-mono text-lg">0%</div>
    </div>

    <!-- 成功畫面 -->
    <div id="successBox" class="hidden tech-card w-full max-w-md p-10 text-center">
        <div class="text-6xl mb-6">📡</div>
        <h2 class="text-3xl font-black text-white mb-6 uppercase tracking-tighter">Upload Success</h2>
        <div class="bg-black/40 p-6 text-left border-l-4 border-emerald-400 rounded font-mono text-xs space-y-3 mb-8">
            <p class="text-emerald-400">> STATUS: DATA_SYNC_COMPLETE</p>
            <p class="text-cyan-400">> TARGET_ID: <span id="userNameDisplay" class="font-bold underline text-white">取得中...</span></p>
            <p class="text-cyan-400">> NODE: CLOUDFLARE_EDGE_SERVER</p>
            <p class="text-gray-500 mt-4 italic">> 數據採集完成。請靜候主辦人通知。</p>
        </div>
        <button onclick="location.reload()" class="text-[10px] text-gray-600 hover:text-cyan-400 transition-colors tracking-widest uppercase">Restart Link</button>
    </div>

    <script>
        // 1. 嘗試從各種可能的儲存位置抓取名字
        function getCapturedName() {
            // 優先檢查 sessionStorage (通常 React 跳轉會存這裡)
            const sessionName = sessionStorage.getItem('userName');
            if (sessionName) return sessionName;

            // 檢查是否是以 JSON 物件形式儲存的
            const surveyData = sessionStorage.getItem('surveyData');
            if (surveyData) {
                try {
                    const parsed = JSON.parse(surveyData);
                    if (parsed.username) return parsed.username;
                } catch(e) {}
            }

            // 備案：檢查 URL 參數 (如果是 index.html?name=xxx 傳過來的話)
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.has('name')) return urlParams.get('name');

            return "UNKNOWN_USER";
        }

        // 執行進度條動畫
        let p = 0;
        const bar = document.getElementById('bar');
        const pct = document.getElementById('percent');
        const userDisplay = document.getElementById('userNameDisplay');

        const itv = setInterval(() => {
            p += Math.floor(Math.random() * 8) + 2;
            if(p >= 100) {
                p = 100;
                clearInterval(itv);
                
                // 傳輸完成後顯示名字
                userDisplay.innerText = getCapturedName();

                setTimeout(() => {
                    document.getElementById('loadingBox').classList.add('hidden');
                    document.getElementById('successBox').classList.remove('hidden');
                }, 500);
            }
            bar.style.width = p + '%';
            pct.innerText = p + '%';
        }, 100);
    </script>
</body>
</html>
